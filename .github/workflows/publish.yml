name: publish

# Publishes multi-arch images to the GitHub Container Registry (ghcr.io).
#   * push to main            -> ghcr.io/<owner>/aiproxy:latest (+ :main, :sha)
#   * push a tag like v1.2.3  -> :1.2.3, :1.2, :1, and a GitHub Release
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write   # needed to create GitHub Releases on tag pushes
  packages: write   # needed to push images to ghcr.io

jobs:
  docker:
    name: build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: create GitHub release
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            ```bash
            docker run --rm -p 8000:8000 \
              -v "$PWD/config.yaml:/app/config.yaml:ro" \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
